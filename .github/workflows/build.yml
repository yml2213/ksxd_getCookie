name: build-desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows x64 Portable EXE
    runs-on: windows-latest

    steps:
      - name: 检出代码 / Checkout
        uses: actions/checkout@v4

      - name: 安装 Node.js / Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖 / Install dependencies
        run: npm ci

      - name: 构建 Windows 单文件 / Build Windows portable
        run: npm run build:win:portable

      - name: 上传 Windows 构建产物 / Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-portable
          path: |
            dist/*portable*.exe
            dist/*.blockmap
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG and ZIP
    runs-on: macos-latest

    steps:
      - name: 检出代码 / Checkout
        uses: actions/checkout@v4

      - name: 安装 Node.js / Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖 / Install dependencies
        run: npm ci

      - name: 构建 macOS 单文件分发包 / Build macOS artifacts
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: 上传 macOS 构建产物 / Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-zip
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error
